            <script>
                const A = document.querySelectorAll('.menu');
                const B = document.querySelectorAll('.menu2');

                A.forEach((cadaA, i) => {
                    A[i].addEventListener('click', () => {
                        if (!B[i].classList.contains('expande')) {
                            B[i].classList.remove('contrae');
                            B[i].classList.add('expande');
                        } else {
                            B[i].classList.remove('expande');
                            B[i].classList.add('contrae');
